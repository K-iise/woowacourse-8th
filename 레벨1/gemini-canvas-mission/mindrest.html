<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>마음 쉼터 - 불안 완화 유틸리티</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600&display=swap');
        
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            background-color: #F8FAFC; /* Soothing slate-50 */
        }

        /* Custom Scrollbar for a softer look */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94A3B8;
        }

        .typing-indicator span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: #94A3B8;
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .message-enter {
            animation: slideUp 0.3s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="h-screen flex flex-col text-slate-800 overflow-hidden selection:bg-teal-100 selection:text-teal-900">

    <!-- Header -->
    <header class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-10 px-4 py-3 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-full bg-teal-50 flex items-center justify-center text-teal-600">
                <i class="fa-solid fa-leaf text-sm"></i>
            </div>
            <div>
                <h1 class="font-semibold text-slate-800 text-lg leading-tight">마음 쉼터</h1>
                <p class="text-xs text-slate-500 font-medium">당신의 불안을 내려놓는 곳</p>
            </div>
        </div>
        <button id="clearBtn" class="text-slate-400 hover:text-slate-600 transition-colors p-2 text-sm flex items-center gap-1 bg-slate-50 rounded-lg border border-slate-100 px-3 py-1.5" title="대화 기록 지우기">
            <i class="fa-solid fa-rotate-right text-xs"></i>
            <span>초기화</span>
        </button>
    </header>

    <!-- Chat Area -->
    <main id="chatArea" class="flex-1 overflow-y-auto p-4 space-y-6 flex flex-col pb-6 scroll-smooth">
        <!-- Welcome Message -->
        <div class="flex items-start gap-3 w-full max-w-2xl mx-auto message-enter">
            <div class="w-8 h-8 rounded-full bg-teal-100 flex-shrink-0 flex items-center justify-center text-teal-600 mt-1 shadow-sm border border-teal-50">
                <i class="fa-solid fa-leaf text-xs"></i>
            </div>
            <div class="bg-white px-5 py-4 rounded-2xl rounded-tl-none shadow-sm border border-slate-100 text-[15px] leading-relaxed text-slate-700 w-full">
                안녕하세요. 이곳은 <strong>'마음 쉼터'</strong>입니다.<br><br>
                사소한 일로 마음이 복잡하거나, 이유 모를 불안감이 밀려올 때 자유롭게 이곳에 적어주세요. 형식이나 분량은 전혀 상관없습니다.<br><br>
                <span class="text-xs text-slate-400 mt-2 block"><i class="fa-solid fa-lock mr-1"></i> 작성하신 모든 내용은 오직 이 기기에만 저장되며, 외부로 전송되지 않습니다.</span>
            </div>
        </div>
    </main>

    <!-- Loading Indicator (Hidden by default) -->
    <div id="loadingIndicator" class="hidden w-full max-w-2xl mx-auto px-4 pb-4 items-start gap-3">
        <div class="w-8 h-8 rounded-full bg-teal-100 flex-shrink-0 flex items-center justify-center text-teal-600 mt-1 shadow-sm border border-teal-50">
            <i class="fa-solid fa-leaf text-xs"></i>
        </div>
        <div class="bg-white px-4 py-3 rounded-2xl rounded-tl-none shadow-sm border border-slate-100 flex items-center h-[42px]">
            <div class="typing-indicator flex items-center">
                <span></span><span></span><span></span>
            </div>
        </div>
    </div>

    <!-- Input Area -->
    <footer class="bg-white border-t border-slate-200 p-3 sm:p-4 shrink-0 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.02)]">
        <div class="max-w-2xl mx-auto relative flex items-end gap-2">
            <textarea id="userInput" rows="1" class="w-full bg-slate-50 border border-slate-200 text-slate-700 text-[15px] rounded-2xl focus:ring-2 focus:ring-teal-100 focus:border-teal-400 focus:bg-white transition-all resize-none px-4 py-3 max-h-[120px] overflow-y-auto" placeholder="현재 느끼는 불안이나 고민을 편하게 적어주세요..." oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'"></textarea>
            <button id="sendBtn" class="bg-teal-600 hover:bg-teal-700 text-white w-11 h-11 rounded-2xl flex items-center justify-center flex-shrink-0 transition-colors shadow-sm disabled:opacity-50 disabled:cursor-not-allowed">
                <i class="fa-solid fa-paper-plane text-sm ml-[-2px]"></i>
            </button>
        </div>
    </footer>

    <script>
        // --- Configuration ---
        const apiKey = ""; // API 키는 런타임 환경에서 주입됩니다.
        const STORAGE_KEY = "mind_comma_chat_history";
        
        // --- State ---
        let chatHistory = [];
        let isWaiting = false;

        // --- DOM Elements ---
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearBtn');
        const loadingIndicator = document.getElementById('loadingIndicator');

        // --- System Prompt ---
        const systemInstruction = `
당신은 사소한 일에도 쉽게 불안해하고 고민하는 사람들을 위한 유틸리티 서비스 '마음 쉼터'의 상담 AI입니다.
당신의 목표는 사용자의 심리적 진입 장벽을 낮추고, 객관적이면서도 수용적인 태도로 불안을 완화하는 것입니다.

다음 4가지 원칙을 반드시 지켜서 답변을 구성하세요:
1. 수용적 공감 (과도한 동조 금지): 사용자의 감정을 있는 그대로 인정하되, 같이 슬퍼하거나 과장되게 반응하지 마세요. 차분하고 수용적인 어조를 유지하세요. (예: "그렇게 느끼시는 것이 자연스럽습니다.", "충분히 신경 쓰일 수 있는 상황이네요.")
2. 사례 기반 안도감 제공: 이 문제가 사용자 혼자만의 비정상적인 문제가 아니라, 많은 사람들이 일상에서 흔히 겪는 현상임을 객관적으로 알려주어 고립감을 줄여주세요.
3. 객관적 감정 구조화: 사용자의 부정적인 사고나 꼬리를 무는 걱정을 팩트(사실)와 분리하여, 상황을 조금 더 균형 잡힌 시각으로 볼 수 있도록 가볍게 재구성해주세요.
4. 즉각적인 불안 해소 지원: 사용자가 지금 당장 자리에서 실천할 수 있는 아주 구체적이고 사소한 행동(예: 4-7-8 심호흡, 주변 사물 5개 이름 속으로 말하기, 물 한 잔 마시기, 걱정 시간 10분 정해두기 등)을 1~2가지 제안하세요.

답변 형식:
- 문체: 정중하고 차분한 해요체/하십시오체.
- 가독성 좋게 단락을 나누고, 핵심 내용은 강조를 사용하세요.
- 너무 길지 않게 핵심만 전달하세요 (최대 3-4문단).
- 절대 의학적 진단을 내리지 마세요.
        `;

        // --- Initialization ---
        function init() {
            const savedData = localStorage.getItem(STORAGE_KEY);
            if (savedData) {
                try {
                    chatHistory = JSON.parse(savedData);
                    renderHistory();
                } catch (e) {
                    console.error("로컬 스토리지 파싱 오류", e);
                    chatHistory = [];
                }
            }

            userInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            });

            sendBtn.addEventListener('click', handleSend);
            
            clearBtn.addEventListener('click', () => {
                if(confirm("모든 대화 기록을 지우시겠습니까? 이 작업은 되돌릴 수 없습니다.")) {
                    localStorage.removeItem(STORAGE_KEY);
                    chatHistory = [];
                    // Keep the welcome message only
                    const welcomeMsg = chatArea.firstElementChild.outerHTML;
                    chatArea.innerHTML = welcomeMsg;
                }
            });
            
            scrollToBottom();
        }

        // --- Text Formatting (Simple Markdown to HTML) ---
        function formatText(text) {
            // Escape HTML to prevent XSS
            let safeText = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            
            // Bold
            safeText = safeText.replace(/\*\*(.*?)\*\*/g, '<strong class="text-teal-800 font-semibold bg-teal-50/50 px-1 rounded">$1</strong>');
            
            // Lists (Basic handling for lines starting with * or -)
            let formattedLines = safeText.split('\n').map(line => {
                const trimmed = line.trim();
                if (trimmed.startsWith('* ') || trimmed.startsWith('- ')) {
                    return `<li class="ml-5 list-disc pl-1 mb-1 text-slate-700">${trimmed.substring(2)}</li>`;
                }
                if (trimmed === '') return '<div class="h-2"></div>'; // Spacing
                return `<div>${line}</div>`;
            });

            // Wrap contiguous <li> elements in <ul> (simple heuristic)
            let finalHtml = '';
            let inList = false;
            for (let i = 0; i < formattedLines.length; i++) {
                if (formattedLines[i].startsWith('<li')) {
                    if (!inList) { finalHtml += '<ul class="my-2">'; inList = true; }
                    finalHtml += formattedLines[i];
                } else {
                    if (inList) { finalHtml += '</ul>'; inList = false; }
                    finalHtml += formattedLines[i];
                }
            }
            if (inList) finalHtml += '</ul>';

            return finalHtml;
        }

        // --- UI Rendering ---
        function renderHistory() {
            // Keep the first welcome message, remove the rest
            const welcomeMsg = chatArea.firstElementChild;
            chatArea.innerHTML = '';
            chatArea.appendChild(welcomeMsg);

            chatHistory.forEach(msg => {
                appendMessageToUI(msg.role, msg.text, false);
            });
            scrollToBottom();
        }

        function appendMessageToUI(role, text, animate = true) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex w-full max-w-2xl mx-auto ${animate ? 'message-enter' : ''}`;
            
            if (role === 'user') {
                wrapper.classList.add('justify-end');
                wrapper.innerHTML = `
                    <div class="bg-slate-700 text-white px-5 py-3.5 rounded-2xl rounded-tr-none shadow-sm text-[15px] leading-relaxed max-w-[85%] break-words whitespace-pre-wrap">
                        ${text.replace(/</g, "&lt;").replace(/>/g, "&gt;")}
                    </div>
                `;
            } else {
                wrapper.classList.add('items-start', 'gap-3');
                wrapper.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-teal-100 flex-shrink-0 flex items-center justify-center text-teal-600 mt-1 shadow-sm border border-teal-50">
                        <i class="fa-solid fa-leaf text-xs"></i>
                    </div>
                    <div class="bg-white px-5 py-4 rounded-2xl rounded-tl-none shadow-sm border border-slate-100 text-[15px] leading-relaxed text-slate-700 w-full max-w-[90%]">
                        ${formatText(text)}
                    </div>
                `;
            }
            
            chatArea.appendChild(wrapper);
            scrollToBottom();
        }

        function scrollToBottom() {
            setTimeout(() => {
                chatArea.scrollTop = chatArea.scrollHeight;
            }, 50);
        }

        function setWaitState(waiting) {
            isWaiting = waiting;
            sendBtn.disabled = waiting;
            userInput.disabled = waiting;
            
            if (waiting) {
                loadingIndicator.classList.remove('hidden');
                loadingIndicator.classList.add('flex');
                scrollToBottom();
            } else {
                loadingIndicator.classList.add('hidden');
                loadingIndicator.classList.remove('flex');
            }
        }

        // --- Interaction Logic ---
        async function handleSend() {
            const text = userInput.value.trim();
            if (!text || isWaiting) return;

            // Reset input
            userInput.value = '';
            userInput.style.height = 'auto'; // Reset height

            // 1. Add User Message
            const userMsg = { role: 'user', text: text };
            chatHistory.push(userMsg);
            saveHistory();
            appendMessageToUI('user', text);

            // 2. Fetch AI Response
            setWaitState(true);
            try {
                const aiResponseText = await fetchGeminiResponse(text);
                
                const aiMsg = { role: 'model', text: aiResponseText };
                chatHistory.push(aiMsg);
                saveHistory();
                appendMessageToUI('model', aiResponseText);

            } catch (error) {
                console.error(error);
                appendMessageToUI('model', "죄송합니다. 현재 불안 완화 분석을 진행하는 데 일시적인 문제가 발생했습니다. 심호흡을 한 번 하시고 잠시 후 다시 시도해주세요.\n\n(오류 메시지: " + error.message + ")");
            } finally {
                setWaitState(false);
                setTimeout(() => userInput.focus(), 100);
            }
        }

        function saveHistory() {
            try {
                // Keep only the last 10 messages to prevent localstorage overflow and keep context relevant
                if (chatHistory.length > 20) {
                    chatHistory = chatHistory.slice(chatHistory.length - 20);
                }
                localStorage.setItem(STORAGE_KEY, JSON.stringify(chatHistory));
            } catch(e) {
                console.warn("로컬 스토리지 저장 실패", e);
            }
        }

        // --- Gemini API Call with Retry Logic ---
        async function fetchGeminiResponse(userText) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            // Build conversation history for context (exclude the current user text, it will be added below)
            const contextParts = chatHistory.slice(0, -1).map(msg => ({
                role: msg.role === 'model' ? 'model' : 'user',
                parts: [{ text: msg.text }]
            }));

            // Add current message
            contextParts.push({
                role: 'user',
                parts: [{ text: userText }]
            });

            const payload = {
                contents: contextParts,
                systemInstruction: {
                    parts: [{ text: systemInstruction }]
                },
                generationConfig: {
                    temperature: 0.7, // Slightly creative but grounded
                }
            };

            const maxRetries = 5;
            let retryCount = 0;

            while (retryCount < maxRetries) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const result = await response.json();
                    
                    if (result.candidates && result.candidates[0].content && result.candidates[0].content.parts) {
                        return result.candidates[0].content.parts[0].text;
                    } else {
                        throw new Error("API 응답 형식을 파싱할 수 없습니다.");
                    }

                } catch (error) {
                    retryCount++;
                    if (retryCount >= maxRetries) {
                        throw new Error("네트워크 연결이 원활하지 않습니다.");
                    }
                    // Exponential backoff: 1s, 2s, 4s, 8s, 16s
                    const delay = Math.pow(2, retryCount - 1) * 1000;
                    await new Promise(resolve => setTimeout(resolve, delay));
                }
            }
        }

        // Initialize App
        window.onload = init;

    </script>
</body>
</html>
